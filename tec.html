<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Aula Prática</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* CSS AVANÇADO: VARIÁREIS (Aula 1) */
        :root {
            --cor-primaria: rgb(138, 7, 252);
            --cor-secundaria: rgb(255, 252, 252);
            --espacamento: 20px;
        }

        body {
            background-color: rgb(40, 37, 37);
            font-family: sans-serif;
        }

        /* HIERARQUIA E NESTING (Aula 1 - Simulado) */
        .cabecalho-store {
            background-color: var(--cor-primaria);
            color: white;
            padding: var(--espacamento);
            text-align: center;
        }

        /* GRID E RESPONSIVIDADE (Aula 3) */
        .galeria-produtos {
            display: grid;
            gap: 15px;
            padding: 20px;
            /* Mobile First: 1 coluna por padrão */
            grid-template-columns: 1fr;
        }

        /* MEDIA QUERIES: Ajuste para telas maiores */
        @media (min-width: 768px) {
            .galeria-produtos {
                grid-template-columns: repeat(3, 1fr); /* 3 colunas no PC */
            }
        }

        .cartao-produto {
            background: rgb(38, 36, 36);
            border: 1px solid #ece2e2;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s
        }
        
        .cartao-produto:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 254, 254, 0.1);
        }

        .cartao-produto h5 {
            color: white !important;
        }

    </style>
</head>
<body>

    <header class="cabecalho-store">
        <h1>TechStore Especialista</h1>
        <p>Aprenda CSS, Bootstrap e Grid na prática!</p>
    </header>

    <main class="container">
        <section class="galeria-produtos mt-4">
            
            <div class="cartao-produto">
                <img src="https://via.placeholder.com/150" alt="Produto" class="img-fluid mb-2">
                <h5>Smartphone X</h5>
                <p class="text-muted">R$ 1.450,00</p>
                <button class="btn btn-success w-100">Comprar Agora</button>
            </div>

            <div class="cartao-produto">
                <img src="https://via.placeholder.com/150" alt="Produto" class="img-fluid mb-2">
                <h5>Notebook Pro</h5>
                <p class="text-muted">R$ 3.500,00</p>
                <button class="btn btn-danger w-100">Ver Detalhes</button>
            </div>

            <div class="cartao-produto">
                <img src="https://via.placeholder.com/150" alt="Produto" class="img-fluid mb-2">
                <h5>Fone Bluetooth</h5>
                <p class="text-muted">R$ 199,00</p>
                <button class="btn btn-primary w-100 text-white">Adicionar</button>
            </div>

        </section>
    </main>

    <footer class="text-center mt-5 p-4 border-top">
        <p>&copy; 2024 TechStore - Atividade Integrada SEDUC-SP</p>
    </footer>

</body>
</html>
